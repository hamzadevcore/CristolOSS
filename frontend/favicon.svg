<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <style>
      @media (prefers-color-scheme: dark) {
        .bg { fill: #2a2a2a; }
        .symbol { fill: #ffffff; }
      }
      @media (prefers-color-scheme: light) {
        .bg { fill: #f2f2f2; }
        .symbol { fill: #111111; }
      }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="100" height="100" rx="22"/>

  <text
    x="48.5"
    y="60"
    text-anchor="middle"
    dominant-baseline="middle"
    font-size="90"
    class="symbol"
    font-family="JetBrains Mono, monospace"
    font-weight="600">
    ◈
  </text>
</svg>
